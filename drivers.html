<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Drivers - Pioneer Logisticz</title>
<link rel="stylesheet" href="css/style.css">
</head>
<body>

<div class="sidebar">
    <h2>Pioneer Logisticz</h2>

    <ul>
        <li><a href="index.html">🏠 Dashboard</a></li>
        <li><a href="trucks.html">🚚 Trucks</a></li>
        <li><a href="drivers.html">👨‍✈️ Drivers</a></li>
        <li><a href="trips.html">🗺️ Trips</a></li>
    </ul>
</div>

<div class="main">

    <h1>Driver Management</h1>

    <div class="card">

        <h2>Add Driver</h2>

        <form onsubmit="event.preventDefault(); addDriver();">

            <input
                id="driverName"
                type="text"
                placeholder="Driver Name"
                style="width:100%;padding:10px;margin-bottom:10px;"
            >

            <input
                id="driverPhone"
                type="text"
                placeholder="Phone Number"
                style="width:100%;padding:10px;margin-bottom:10px;"
            >

            <input
                id="driverLicense"
                type="text"
                placeholder="License Number"
                style="width:100%;padding:10px;margin-bottom:10px;"
            >

            <button type="submit">
                Add Driver
            </button>

        </form>

    </div>

    <div class="card" style="margin-top:20px;">

        <h2>Drivers List</h2>

        <table width="100%">

            <tr>
                <th>Name</th>
                <th>Phone</th>
                <th>License</th>
                <th>Action</th>
            </tr>

            <tbody id="driverTable"></tbody>

        </table>

    </div>

</div>

<script src="js/app.js"></script>

</body>
</html>
