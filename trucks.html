<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Truck Fleet Management - Pioneer Logisticz</title>
    <link rel="stylesheet" href="css/style.css">
</head>
<body>

<div class="sidebar">
    <h2>Pioneer Logisticz</h2>
    <ul>
        <li><a href="index.html">🏠 Dashboard</a></li>
        <li><a href="trucks.html">🚚 Trucks</a></li>
        <li><a href="drivers.html">👨‍✈️ Drivers</a></li>
        <li><a href="trips.html">🗺️ Trips</a></li>
        <li><a href="maintenance.html">🔧 Maintenance</a></li>
        <li><a href="fuel.html">⛽ Fuel</a></li>
    </ul>

    <div id="userProfile" style="margin-top: 40px; padding-top: 20px; border-top: 2px solid rgba(255, 255, 255, 0.3);">
        <div id="userInfo" style="margin-bottom: 15px;">
            <p style="font-size: 12px; color: rgba(255, 255, 255, 0.7); margin-bottom: 5px;">Logged in as:</p>
            <p id="userName" style="color: white; font-weight: 600;">User</p>
            <p id="userRole" style="font-size: 12px; color: rgba(255, 255, 255, 0.8);">Role: User</p>
        </div>
        <button onclick="logout()" style="width: 100%; padding: 10px; background-color: rgba(255, 255, 255, 0.2); color: white; border: 1px solid rgba(255, 255, 255, 0.4); border-radius: 6px; cursor: pointer; font-weight: 600; transition: all 0.3s ease;" onmouseover="this.style.backgroundColor='rgba(255, 255, 255, 0.3)'" onmouseout="this.style.backgroundColor='rgba(255, 255, 255, 0.2)'">🚪 Logout</button>
    </div>
</div>

<div class="main">
    <h1>🚚 Truck Fleet Management</h1>

    <div class="card" style="margin-top:20px;">
        <h2>Add New Truck</h2>
        <br>

        <form onsubmit="event.preventDefault(); addTruck();">
            <input
                id="truckId"
                type="text"
                placeholder="Truck ID (PL-001)"
                style="width:100%;padding:12px;margin-bottom:10px;"
                required
            >

            <input
                id="plate"
                type="text"
                placeholder="License Plate"
                style="width:100%;padding:12px;margin-bottom:10px;"
                required
            >

            <input
                id="model"
                type="text"
                placeholder="Truck Model"
                style="width:100%;padding:12px;margin-bottom:10px;"
                required
            >

            <select
                id="status"
                style="width:100%;padding:12px;margin-bottom:10px;"
            >
                <option>Available</option>
                <option>In Transit</option>
                <option>Maintenance</option>
            </select>

            <button
                type="submit"
                style="padding:12px 20px;cursor:pointer;"
            >
                Add Truck
            </button>
        </form>
    </div>

    <div class="card" style="margin-top:20px;">
        <h2>Fleet Trucks</h2>
        <br>

        <table width="100%" cellpadding="10">
            <thead>
                <tr>
                    <th align="left">Truck ID</th>
                    <th align="left">Plate</th>
                    <th align="left">Model</th>
                    <th align="left">Status</th>
                    <th align="left">Action</th>
                </tr>
            </thead>
            <tbody id="truckTable">
            </tbody>
        </table>
    </div>
</div>

<script src="js/auth.js"></script>
<script src="js/app.js"></script>
<script>
    if (!checkAuth()) return;
    
    function displayUserInfo() {
        const user = getCurrentUser();
        if (user) {
            document.getElementById('userName').textContent = user.name;
            document.getElementById('userRole').textContent = 'Role: ' + user.role.charAt(0).toUpperCase() + user.role.slice(1);
        }
    }
    
    displayUserInfo();
    initPage();
</script>

</body>
</html>
